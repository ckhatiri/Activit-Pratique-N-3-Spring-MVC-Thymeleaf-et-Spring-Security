<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{template}">
<head>
    <title>Liste des produits</title>
</head>
<body>
<div layout:fragment="content">

    <h2 class="mb-4">Liste des produits</h2>

    <!-- Point 8 : formulaire de recherche -->
    <form th:action="@{/user/products}" method="get" class="row mb-3">
        <div class="col-auto">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Rechercher un produit...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Rechercher</button>
        </div>
        <div class="col-auto ms-auto" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/formProducts}" class="btn btn-success">+ Ajouter un produit</a>
        </div>
    </form>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Quantité</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listProducts}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price} + ' DH'"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/editProduct(id=${product.id})}"
                   class="btn btn-warning btn-sm">Modifier</a>
                <a th:href="@{/admin/deleteProduct(id=${product.id},page=${currentPage},keyword=${keyword})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Confirmer la suppression de ce produit ?');">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <ul class="pagination">
        <li th:each="pageIndex, iter : ${pages}"
            th:class="${iter.index} == ${currentPage} ? 'page-item active' : 'page-item'">
            <a class="page-link"
               th:href="@{/user/products(page=${iter.index},keyword=${keyword})}"
               th:text="${iter.index + 1}"></a>
        </li>
    </ul>

</div>
</body>
</html>
