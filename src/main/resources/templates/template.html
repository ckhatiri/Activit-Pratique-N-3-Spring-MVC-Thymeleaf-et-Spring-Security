<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Gestion des produits</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/user/products}">Gestion des Produits</a>
        <div class="d-flex ms-auto align-items-center">
            <span class="text-light me-3" sec:authorize="isAuthenticated()">
                Connecté en tant que : <b sec:authentication="name"></b>
            </span>
            <a class="btn btn-outline-light btn-sm" th:href="@{/logout}" sec:authorize="isAuthenticated()">
                Déconnexion
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div layout:fragment="content">
        <!-- Le contenu de chaque page vient ici -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
